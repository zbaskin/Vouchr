enum EventType {
  MOVIE
  CONCERT
  SPORT
  FLIGHT
}

enum SortType {
  ALPHABETICAL
  EVENT_TYPE
  EVENT_DATE
  TIME_CREATED
}

enum Visibility {
  PUBLIC
  PRIVATE
}

type User
  @model
  @auth(rules: [
    # Only the owner (the logged-in user) can mutate and read their own row.
    { allow: owner, ownerField: "owner", operations: [create, update, delete, read] }

    # NOTE: The broad { allow: private, operations: [read] } rule was intentionally
    # removed. It would let any authenticated user read any other user's profile,
    # bypassing ownership. If public profiles are needed later, add a visibility
    # check via a Lambda resolver or a per-record flag.
  ]) {
  id: ID!
  owner: String! @index(name: "byOwner", queryField: "userByOwner")  # Cognito sub
  username: String!
  displayName: String
  bio: String

  # Store only S3 keys, never public URLs
  avatarKey: String

  # If you want public-facing profiles later, flip this on per user
  isProfilePublic: Boolean!

  # Relationship to their collection (1:1)
  ticketsCollectionId: ID
  Tickets: TicketCollection @hasOne(fields: ["ticketsCollectionId"])
}

type TicketCollection
  @model
  @auth(rules: [
    # Only the owner can create, read, update, and delete their own collection.
    { allow: owner, ownerField: "owner", operations: [create, update, delete, read] },

    # Allow unauthenticated read for PUBLIC collections only (requires IAM to be enabled).
    # This is intentional: it enables sharing public collection links without login.
    { allow: public, provider: iam, operations: [read] }

    # REMOVED: { allow: private, operations: [read] }
    # That rule let ANY authenticated Cognito user read ANY collection regardless
    # of ownership. The visibility field was never enforced at the API layer as a
    # result. Owner-only access is the correct default; coarse-grained sharing
    # must be handled via a Lambda resolver with an explicit visibility check.
  ]) {
  id: ID!
  owner: String! @index(name: "collectionsByOwner", queryField: "collectionsByOwner")
  title: String
  description: String
  visibility: Visibility!
  sort: SortType

  # derived counts
  ticketCount: Int!

  # one-to-many with Ticket
  Tickets: [Ticket] @hasMany(indexName: "byTicketCollection", fields: ["id"])
}

type Ticket
  @model
  @auth(rules: [
    # Only the owner can create, read, update, and delete their own tickets.
    { allow: owner, ownerField: "owner", operations: [create, update, delete, read] },

    # Allow unauthenticated read for PUBLIC collection content (requires IAM to be enabled).
    { allow: public, provider: iam, operations: [read] }

    # REMOVED: { allow: private, operations: [read] }
    # That rule let any authenticated user read any ticket, bypassing the visibility
    # field. Owner-only access is the correct default.
  ]) {
  id: ID!
  owner: String! @index(name: "ticketsByOwner", queryField: "ticketsByOwner")

  name: String!
  type: EventType!
  venue: String
  theater: String
  seat: String
  city: String
  eventDate: AWSDate
  eventTime: AWSTime
  timeCreated: AWSTimestamp!

  # Foreign key to collection
  ticketsID: ID! @index(name: "byTicketCollection")

  # Mirror the parent's visibility at write-time (denormalized for fast reads)
  visibility: Visibility!
}
