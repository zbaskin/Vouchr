enum EventType {
  MOVIE
  CONCERT
  SPORT
  FLIGHT
}

enum SortType {
  ALPHABETICAL
  EVENT_TYPE
  EVENT_DATE
  TIME_CREATED
}

enum Visibility {
  PUBLIC
  PRIVATE
}

type User
  @model
  @auth(rules: [
    # Only the owner (the logged-in user) can mutate their own row
    { allow: owner, ownerField: "owner", operations: [create, update, delete] },

    # Owner can read their own row
    { allow: owner, ownerField: "owner", operations: [read] },

    # Optional: any signed-in user can read non-sensitive profile info
    { allow: private, operations: [read] }

    # (Do NOT add public read here unless you truly want public profiles)
  ]) {
  id: ID!
  owner: String! @index(name: "byOwner", queryField: "userByOwner")  # Cognito sub
  username: String!
  displayName: String
  bio: String

  # Store only S3 keys, never public URLs
  avatarKey: String

  # If you want public-facing profiles later, flip this on per user
  isProfilePublic: Boolean! @default(value: false)

  # Relationship to their collection (1:1)
  ticketsCollectionId: ID
  Tickets: TicketCollection @hasOne(fields: ["ticketsCollectionId"])
}

type TicketCollection
  @model
  @auth(rules: [
    # Only owner can write
    { allow: owner, ownerField: "owner", operations: [create, update, delete] },

    # Owner can read
    { allow: owner, ownerField: "owner", operations: [read] },

    # Optional: let *signed-in* users read if collection is PUBLIC
    # (This is coarse-grained. If you later want FOLLOWERS-only, we’ll move to a Lambda gate.)
    { allow: private, operations: [read] },

    # Optional: allow unauthenticated read for PUBLIC collections only (if you enabled IAM)
    { allow: public, provider: iam, operations: [read] }
  ]) {
  id: ID!
  owner: String! @index(name: "collectionsByOwner", queryField: "collectionsByOwner")
  title: String
  description: String
  visibility: Visibility! @default(value: PRIVATE)
  sort: SortType

  # derived counts
  ticketCount: Int! @default(value: 0)

  # one-to-many with Ticket
  Tickets: [Ticket] @hasMany(indexName: "byTicketCollection", fields: ["id"])
}

type Ticket
  @model
  @auth(rules: [
    # Only owner can write (create/update/delete)
    { allow: owner, ownerField: "owner", operations: [create, update, delete] },

    # Owner can read
    { allow: owner, ownerField: "owner", operations: [read] },

    # Optional: signed-in users can read if its parent collection is PUBLIC
    { allow: private, operations: [read] },

    # Optional: unauthenticated read (IAM) for PUBLIC collection content
    { allow: public, provider: iam, operations: [read] }
  ]) {
  id: ID!
  owner: String! @index(name: "ticketsByOwner", queryField: "ticketsByOwner")

  name: String!
  type: EventType!
  venue: String
  theater: String
  seat: String
  city: String
  eventDate: AWSDate
  eventTime: AWSTime
  timeCreated: AWSTimestamp!

  # Foreign key to collection
  ticketsID: ID! @index(name: "byTicketCollection")

  # Mirror the parent’s visibility at write-time (denormalized for fast reads)
  visibility: Visibility! @default(value: PRIVATE)
}